<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Maker</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/list.css">
  <link rel="stylesheet" href="css/preview.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>
  <div id="app">
    <!-- 頂部導航 -->
    <header class="header">
      <div class="header-title">
        <span class="logo">🏷️</span>
        <h1>Label Maker</h1>
      </div>
      <button class="btn-settings" id="openSettings" title="設置">⚙️ 設置</button>
    </header>

    <!-- 主體區域 -->
    <div class="main-layout">
      <!-- 左側：輸入區域 -->
      <div class="panel left-panel">
        <!-- 標籤頁切換 -->
        <div class="tab-bar">
          <button class="tab active" data-tab="manual">手動輸入</button>
          <button class="tab" data-tab="ocr">圖片識別</button>
          <button class="tab" data-tab="batch">批量匯入</button>
        </div>

        <!-- 手動輸入 -->
        <div class="tab-content active" id="tab-manual">
          <div class="form-group">
            <label>SKU 編號</label>
            <input type="text" id="skuInput" placeholder="輸入 SKU..." class="input-large">
          </div>
          <div class="form-group">
            <label>數量</label>
            <input type="number" id="qtyInput" value="1" min="1" class="input-small">
          </div>
          <button class="btn-primary" id="addManualSku">加入列表</button>
        </div>

        <!-- OCR 圖片識別 -->
        <div class="tab-content" id="tab-ocr">
          <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📷</div>
            <p>點擊或拖曳圖片到此處</p>
            <p class="upload-hint">支援 JPG, PNG, BMP</p>
            <input type="file" id="imageInput" accept="image/*" style="display:none">
          </div>
          <div id="ocrStatus" class="ocr-status"></div>
          <div id="ocrPreview" class="ocr-preview" style="display:none">
            <img id="ocrImage" src="" alt="預覽">
          </div>
          <div id="ocrResult" class="ocr-result" style="display:none">
            <label>識別到的 SKU：</label>
            <input type="text" id="ocrSkuInput" class="input-large">
            <div class="form-group" style="margin-top:8px">
              <label>數量</label>
              <input type="number" id="ocrQtyInput" value="1" min="1" class="input-small">
            </div>
            <button class="btn-primary" id="addOcrSku">加入列表</button>
          </div>
        </div>

        <!-- 批量匯入 -->
        <div class="tab-content" id="tab-batch">
          <div class="upload-zone" id="excelUploadZone">
            <div class="upload-icon">📊</div>
            <p>點擊上傳 Excel 或 CSV</p>
            <p class="upload-hint">支援 .xlsx, .xls, .csv</p>
            <input type="file" id="excelInput" accept=".xlsx,.xls,.csv" style="display:none">
          </div>
          <div id="batchStatus" class="ocr-status"></div>
          <div id="batchPreview" style="display:none">
            <p class="batch-info" id="batchInfo"></p>
            <button class="btn-primary" id="addAllBatch">全部加入列表</button>
          </div>
          <div class="batch-hint">
            <p>📋 Excel/CSV 格式說明：</p>
            <ul>
              <li>第一欄：SKU</li>
              <li>第二欄：數量（可選）</li>
            </ul>
          </div>
        </div>
      </div>

      <!-- 中間：SKU 列表 -->
      <div class="panel center-panel">
        <div class="panel-header">
          <h3>打印列表</h3>
          <button class="btn-danger-sm" id="clearList">清空</button>
        </div>
        <div id="skuList" class="sku-list">
          <div class="empty-hint">尚未添加任何 SKU</div>
        </div>
        <div class="list-footer">
          <span id="totalCount">共 0 個標籤</span>
          <div class="print-actions">
            <select id="printerSelect" class="printer-select">
              <option value="">選擇打印機...</option>
            </select>
            <button class="btn-preview" id="previewBtn">👁 預覽</button>
            <button class="btn-print" id="printBtn">🖨️ 打印</button>
          </div>
        </div>
      </div>

      <!-- 右側：標籤預覽 -->
      <div class="panel right-panel">
        <div class="panel-header">
          <h3>標籤預覽</h3>
        </div>
        <div class="preview-container">
          <div class="label-preview" id="labelPreview">
            <div class="label-sku" id="previewSku">SKU-EXAMPLE</div>
          </div>
        </div>
        <div class="preview-size-info" id="previewSizeInfo">100 mm × 150 mm</div>
      </div>
    </div>
  </div>

  <!-- 設置彈窗 -->
  <div class="modal" id="settingsModal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚙️ 標籤設置</h2>
        <button class="modal-close" id="closeSettings">✕</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <h4>標籤尺寸</h4>
          <div class="size-inputs">
            <div class="form-group">
              <label>寬度 (mm)</label>
              <input type="number" id="labelWidth" value="150" min="10" max="300">
            </div>
            <div class="size-separator">×</div>
            <div class="form-group">
              <label>高度 (mm)</label>
              <input type="number" id="labelHeight" value="100" min="10" max="500">
            </div>
          </div>
        </div>
        <div class="setting-group">
          <h4>字體設置</h4>
          <div class="form-group">
            <label>字體大小</label>
            <input type="number" id="fontSize" value="15" min="3" max="100">
            <span class="unit">mm</span>
          </div>
          <div class="form-group">
            <label>字體粗細</label>
            <select id="fontWeight">
              <option value="normal">普通</option>
              <option value="bold" selected>粗體</option>
            </select>
          </div>
        </div>
        <div class="setting-group">
          <h4>對齊方式</h4>
          <div class="align-buttons">
            <button class="align-btn active" data-align="center">居中</button>
            <button class="align-btn" data-align="left">靠左</button>
            <button class="align-btn" data-align="right">靠右</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="saveSettings">保存設置</button>
      </div>
    </div>
  </div>

  <script src="js/settings.js"></script>
  <script src="js/list.js"></script>
  <script src="js/ocr.js"></script>
  <script src="js/batch.js"></script>
  <script src="js/preview.js"></script>
  <script src="js/print.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
